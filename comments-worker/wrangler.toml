name = "nryn-comments"
main = "src/index.ts"
compatibility_date = "2026-06-27"

# Serve only the comments API on the live domain. Worker routes take precedence
# over the Pages site, so /api/* hits this Worker and everything else stays on Pages.
routes = [
  { pattern = "nryn.dev/api/*", zone_name = "nryn.dev" }
]

# Shared D1 database with the comments table (see ../schema.sql).
[[d1_databases]]
binding = "DB"
database_name = "nryn-dev-comments-db"
database_id = "b8a52b46-652b-4cda-9eb7-d3903b9ee1a1"

[observability]
enabled = true
